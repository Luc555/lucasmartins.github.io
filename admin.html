<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lucas Martins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────────── -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">LM<span class="dot">.</span></div>
      <h1 class="login-title">Admin</h1>
      <input
        type="password"
        id="password-input"
        class="adm-input"
        placeholder="Senha"
        autocomplete="current-password"
      />
      <button id="login-btn" class="adm-btn-primary">Entrar</button>
      <p id="login-error" class="adm-error-msg"></p>
    </div>
  </div>

  <!-- ── ADMIN PANEL ───────────────────────────────────────── -->
  <div id="admin-panel" style="display:none">

    <header class="adm-header">
      <span class="adm-header-logo">LM<span class="dot">.</span> Admin</span>
      <div class="adm-header-right">
        <a href="index.html" class="adm-link">← Ver site</a>
        <button id="logout-btn" class="adm-btn-ghost">Sair</button>
      </div>
    </header>

    <main class="adm-main">

      <!-- PROJETOS -->
      <section class="adm-section">
        <div class="adm-section-header">
          <h2 class="adm-section-title">Projetos</h2>
          <button id="new-project-btn" class="adm-btn-primary">+ Novo projeto</button>
        </div>

        <div id="projects-list" class="adm-list"></div>

        <!-- FORMULÁRIO (oculto por padrão) -->
        <div id="form-panel" class="adm-form-panel" style="display:none">
          <h3 id="form-title" class="adm-form-title">Novo projeto</h3>

          <div class="adm-form-grid">

            <div class="adm-field">
              <label for="f-title">Título <span class="req">*</span></label>
              <input id="f-title" class="adm-input" type="text" placeholder="Ex: Task Manager" />
            </div>

            <div class="adm-field adm-field-full">
              <label for="f-description">Descrição <span class="req">*</span></label>
              <textarea id="f-description" class="adm-input adm-textarea" rows="3" placeholder="1-2 frases descrevendo o projeto"></textarea>
            </div>

            <div class="adm-field">
              <label for="f-tags">Tags <span class="req">*</span></label>
              <input id="f-tags" class="adm-input" type="text" placeholder="React, Node.js, PostgreSQL" />
              <span class="adm-hint">Separadas por vírgula</span>
            </div>

            <div class="adm-field">
              <label for="f-github">GitHub <span class="req">*</span></label>
              <input id="f-github" class="adm-input" type="url" placeholder="https://github.com/Luc555/projeto" />
            </div>

            <div class="adm-field">
              <label for="f-live">Live demo</label>
              <input id="f-live" class="adm-input" type="url" placeholder="https://meu-app.vercel.app (opcional)" />
            </div>

            <div class="adm-field">
              <label for="f-folder">Pasta das fotos <span class="req">*</span></label>
              <input id="f-folder" class="adm-input" type="text" placeholder="project-alpha" />
              <span class="adm-hint">Nome da pasta em assets/images/projects/</span>
            </div>

            <div class="adm-field adm-field-full">
              <label for="f-photos">Arquivos de foto</label>
              <input id="f-photos" class="adm-input" type="text" placeholder="1.png, 2.png, 3.png" />
              <span class="adm-hint">Nomes dos arquivos dentro da pasta, separados por vírgula</span>
            </div>

          </div>

          <div class="adm-form-actions">
            <button id="save-btn"   class="adm-btn-primary">Salvar projeto</button>
            <button id="cancel-btn" class="adm-btn-ghost">Cancelar</button>
            <span   id="save-status" class="adm-status"></span>
          </div>
        </div>
      </section>

      <!-- CONTATOS -->
      <section class="adm-section">
        <div class="adm-section-header">
          <h2 class="adm-section-title">Mensagens recebidas</h2>
        </div>
        <div id="contacts-list" class="adm-list"></div>
      </section>

    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/admin.js"></script>

</body>
</html>
