name: Deploy portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # 1. Baixa o código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Injeta os secrets no config.js
      - name: Inject secrets into config.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLIC_KEY:  ${{ secrets.SUPABASE_PUBLIC_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_PASSWORD:       ${{ secrets.ADMIN_PASSWORD }}
        run: |
          sed \
            -e "s|__SUPABASE_URL__|${SUPABASE_URL}|g" \
            -e "s|__SUPABASE_PUBLIC_KEY__|${SUPABASE_PUBLIC_KEY}|g" \
            -e "s|__SUPABASE_SERVICE_KEY__|${SUPABASE_SERVICE_KEY}|g" \
            -e "s|__ADMIN_PASSWORD__|${ADMIN_PASSWORD}|g" \
            assets/js/config.template.js > assets/js/config.js

      # 3. Remove config.js do .gitignore para o deploy incluir ele
      - name: Allow config.js in deploy
        run: |
          sed -i '/assets\/js\/config\.js/d' .gitignore

      # 4. Publica no GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,assets/js/config.template.js'