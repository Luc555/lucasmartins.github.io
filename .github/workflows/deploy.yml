name: Deploy portfolio

on:
  push:
    branches: [main]   # dispara a cada push na branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necessário para publicar no GitHub Pages

    steps:

      # 1. Baixa o código do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Substitui os placeholders do config.template.js
      #    pelos valores reais guardados nos GitHub Secrets
      - name: Inject secrets into config.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLIC_KEY:  ${{ secrets.SUPABASE_PUBLIC_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_PASSWORD:       ${{ secrets.ADMIN_PASSWORD }}
        run: |
          sed \
            -e "s|__SUPABASE_URL__|${SUPABASE_URL}|g" \
            -e "s|__SUPABASE_PUBLIC_KEY__|${SUPABASE_PUBLIC_KEY}|g" \
            -e "s|__SUPABASE_SERVICE_KEY__|${SUPABASE_SERVICE_KEY}|g" \
            -e "s|__ADMIN_PASSWORD__|${ADMIN_PASSWORD}|g" \
            assets/js/config.template.js > assets/js/config.js

      # 3. Publica tudo no GitHub Pages (branch gh-pages)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # publica a raiz do projeto
          publish_branch: gh-pages
          exclude_assets: '.github,assets/js/config.template.js'